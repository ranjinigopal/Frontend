<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkblue;
        }

        a {
            text-decoration: none;
            color: green;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to My Website</h1>

        <p>
            This is a simple HTML and CSS sample webpage.
        </p>

        <img src="https://picsum.photos/400/200" alt="Sample Image">

        <br><br>

        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>

        <br>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage() {
            alert("Hello! Button clicked successfully.");
        }
    </script>

</body>
</html>
